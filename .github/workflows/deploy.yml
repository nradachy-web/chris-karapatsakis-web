name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Set these as repo Variables (Settings > Secrets and variables > Actions > Variables)
          # to wire the lead form and conversion tracking. Empty is safe (form logs, tags no-op).
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ vars.NEXT_PUBLIC_WEB3FORMS_KEY }}
          NEXT_PUBLIC_ADS_ID: ${{ vars.NEXT_PUBLIC_ADS_ID }}
          NEXT_PUBLIC_ADS_CMA_SENDTO: ${{ vars.NEXT_PUBLIC_ADS_CMA_SENDTO }}
          NEXT_PUBLIC_ADS_CALL_SENDTO: ${{ vars.NEXT_PUBLIC_ADS_CALL_SENDTO }}
          NEXT_PUBLIC_GA4_ID: ${{ vars.NEXT_PUBLIC_GA4_ID }}
          # Preview on the GitHub Pages project page. For the real domain cutover:
          # drop this line and add public/CNAME with chriskarapatsakis.com.
          NEXT_PUBLIC_BASE_PATH: "/chris-karapatsakis-web"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
